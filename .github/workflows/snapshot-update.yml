name: Update Playwright Snapshots

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to commit updated snapshots to
        required: true
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-snapshots:
    name: Regenerate Linux WebKit snapshots
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve target branch
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install webkit --with-deps

      - name: Regenerate snapshots
        run: npx playwright test --update-snapshots
        env:
          CI: true

      - name: Commit and open PR if snapshots changed
        run: |
          TARGET="${{ steps.target.outputs.branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/**-snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes — nothing to commit."
          else
            PR_BRANCH="chore/snapshots-${{ github.run_id }}"
            git checkout -b "$PR_BRANCH"
            git commit -m "chore: update Playwright snapshots for Linux WebKit"
            git push origin "$PR_BRANCH"
            gh pr create \
              --base "$TARGET" \
              --head "$PR_BRANCH" \
              --title "chore: update Playwright snapshots for Linux WebKit" \
              --body "Automated snapshot regeneration triggered by workflow run ${{ github.run_id }}."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
